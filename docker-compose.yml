version: '3.8'

services:
  db:
    image: postgres:15
    container_name: my_postgres_db
    environment:
      POSTGRES_DB: GroceryShop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: kolmar1203
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: my_django_app
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      POSTGRES_DB: GroceryShop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_password
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432

volumes:
  postgres_data: